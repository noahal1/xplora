<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xplora 快添 设置</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>Xplora 快添</span>
      </div>
      <p class="subtitle">浏览器快速添加电影/剧集到 Xplora</p>
    </header>

    <section class="config">
      <div class="field">
        <label for="serverUrl">服务器地址</label>
        <input type="url" id="serverUrl" placeholder="http://192.168.1.100:8010" spellcheck="false" />
        <p class="hint">Xplora 后端运行的地址，包含端口号</p>
      </div>

      <div class="field">
        <label for="apiToken">API Token</label>
        <input type="password" id="apiToken" placeholder="粘贴你的 JWT Token" spellcheck="false" />
        <p class="hint">
          在 Xplora 页面 F12 → Application → Local Storage → <code>xplora-token</code>
        </p>
      </div>

      <button id="saveBtn">保存</button>
      <p id="status" class="status"></p>
    </section>

    <section class="usage">
      <h3>使用方式</h3>
      <ul>
        <li><strong>右键菜单</strong> — 选中任意电影名称 → 右键 → "搜索并添加到 Xplora 想看列表"</li>
        <li><strong>TMDB</strong> — 在 TMDB 电影/剧集页面点击「想看」或「已看」按钮</li>
        <li><strong>IMDb</strong> — 在 IMDb 电影页面点击「想看」或「已看」按钮</li>
        <li><strong>豆瓣</strong> — 在豆瓣电影页面点击「想看」或「已看」按钮</li>
      </ul>
    </section>

    <footer>
      <span>v1.0.0</span>
      <a href="#" id="testBtn">测试连接</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
