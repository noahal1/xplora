# ──────────────────────────────────────────────────────────────────
# Nginx configuration snippet — Xplore poster cache
# ──────────────────────────────────────────────────────────────────
#
# Place in /etc/nginx/sites-available/ (or a conf.d snippet) and
# reload: sudo nginx -t && sudo systemctl reload nginx
#
# Assumes the FastAPI backend runs on localhost:8327.
# Adjust proxy_pass and root paths as needed.

server {
    listen 80;
    server_name your-domain.com;             # ← change to your domain

    # ── Poster images: aggressive browser caching ─────────────────
    # Posters are immutable once written (filename includes tmdb_id or
    # content hash), so they can be cached for a very long time.
    location /static/posters/ {
        proxy_pass http://localhost:8327;

        # Cache-Control: max-age=31536000 (1 year) + immutable
        # The `immutable` directive tells the browser it never needs
        # to revalidate — the file content will not change at the URL.
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Strip cookies — posters don't need auth
        proxy_set_header Cookie "";
    }

    # ── Everything else: proxy to FastAPI backend ─────────────────
    location / {
        proxy_pass http://localhost:8327;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ──────────────────────────────────────────────────────────────────
# Local development  (no domain, direct localhost access)
# ──────────────────────────────────────────────────────────────────
#
# If you're running nginx locally without a domain, use:
#
#   listen 127.0.0.1:8080;
#   server_name localhost;
#
# and point your browser at http://localhost:8080.
# The Expires headers still apply.
