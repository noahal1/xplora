services:
  db:
    image: postgres:16-alpine
    container_name: xplore-db
    environment:
      POSTGRES_USER: xplore
      POSTGRES_PASSWORD: xplore_pg_pass
      POSTGRES_DB: xplore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xplore"]
      interval: 10s
      timeout: 5s
      retries: 5

  recommender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-recommender
    ports:
      - "8327:8327"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://xplore:xplore_pg_pass@db:5432/xplore
      # --- API Keys (optional, uncomment and fill in as needed) ---
      # - DEEPSEEK_API_KEY=sk-your-deepseek-key
      # - OPENAI_API_KEY=sk-your-openai-key
      # - TMDB_API_KEY=your-tmdb-api-key
      # - OMDB_API_KEY=your-omdb-api-key
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - poster_data:/app/backend/static/posters
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8327/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  poster_data:
