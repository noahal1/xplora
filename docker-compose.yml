services:
  xplora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xplora
    ports:
      - "8327:8327"
    env_file:
      - .env
    environment:
      # SQLite database file path (inside the container)
      - DATABASE_URL=sqlite:////app/data/xplora.db
      # --- API Keys (optional, uncomment and fill in as needed) ---
      # - DEEPSEEK_API_KEY=sk-your-deepseek-key
      # - OPENAI_API_KEY=sk-your-openai-key
      # - TMDB_API_KEY=your-tmdb-api-key
      # - OMDB_API_KEY=your-omdb-api-key
    restart: unless-stopped
    volumes:
      # SQLite database file lives in your project directory
      - ./data:/app/data
      # Poster cache
      - poster_data:/app/backend/static/posters
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8327/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  poster_data:
